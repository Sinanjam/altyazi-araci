name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build signed release APK
        run: gradle assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release-output
          cp app/build/outputs/apk/release/app-release.apk release-output/Altyazi_Araci.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Altyazi-Araci-Release-APK
          path: release-output/Altyazi_Araci.apk
